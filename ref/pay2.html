<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Success - Artxtic</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FFFFFF", // High contrast white for dark mode primary
                        "background-light": "#F3F4F6",
                        "background-dark": "#050505",
                        "surface-dark": "#0A0A0A",
                        "surface-light": "#FFFFFF",
                        "border-dark": "#27272a",
                        "border-light": "#e5e7eb",
                        "success": "#10B981",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        serif: ["Playfair Display", "serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': '0.75rem',
                        '2xl': '1rem',
                        '3xl': '1.5rem',
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        }
        .dark .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 min-h-screen relative overflow-hidden flex flex-col items-center justify-center transition-colors duration-300">
<div class="absolute inset-0 bg-grid-pattern pointer-events-none z-0"></div>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-background-dark/50 to-background-dark pointer-events-none z-0"></div>
<main class="relative z-10 w-full max-w-md px-6 flex flex-col items-center text-center animate-fade-in-up">
<div class="relative mb-8 group">
<div class="absolute inset-0 bg-success/20 blur-2xl rounded-full transform scale-150 opacity-50"></div>
<div class="relative w-24 h-24 rounded-full border-[3px] border-success/30 flex items-center justify-center bg-surface-dark/50 backdrop-blur-sm shadow-2xl">
<span class="material-symbols-outlined text-5xl text-success" style="font-variation-settings: 'wght' 600;">check</span>
</div>
<div class="absolute -top-1 -right-1 w-3 h-3 bg-success rounded-full shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
</div>
<h1 class="font-serif text-3xl md:text-4xl font-bold text-white mb-4 tracking-tight">Payment Successful!</h1>
<p class="text-gray-400 text-sm md:text-base leading-relaxed mb-10 max-w-xs mx-auto">
            Your Pro subscription is now active.<br/>Enjoy unlimited generations.
        </p>
<div class="w-full bg-surface-dark/80 backdrop-blur-md border border-white/10 rounded-2xl p-1 mb-8 shadow-2xl overflow-hidden ring-1 ring-white/5">
<div class="bg-white/5 rounded-xl p-5 border border-white/5">
<div class="flex justify-between items-center mb-4 pb-4 border-b border-white/10 border-dashed">
<div class="flex flex-col items-start gap-1">
<span class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Order ID</span>
<span class="text-sm font-mono text-gray-200">#ART-8829-PRO</span>
</div>
<div class="text-right flex flex-col items-end gap-1">
<span class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Date</span>
<span class="text-sm text-gray-200">Oct 24, 2025</span>
</div>
</div>
<div class="flex justify-between items-center">
<div class="flex flex-col items-start gap-1">
<span class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Plan</span>
<span class="text-sm font-semibold text-white">Artxtic Pro <span class="text-gray-500 font-normal">/ Monthly</span></span>
</div>
<div class="h-8 w-8 rounded-full bg-success/10 flex items-center justify-center border border-success/20 text-success">
<span class="material-symbols-outlined text-sm">receipt_long</span>
</div>
</div>
</div>
</div>
<button class="w-full bg-white text-black font-semibold py-3.5 rounded-xl transition-all hover:bg-gray-100 hover:scale-[1.01] active:scale-[0.99] shadow-[0_0_20px_rgba(255,255,255,0.1)] flex items-center justify-center gap-2 group">
            Go to Dashboard
            <span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
<div class="mt-6 flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/5">
<div class="w-2 h-2 rounded-full bg-gray-500 animate-pulse"></div>
<p class="text-xs text-gray-400 font-medium">Redirecting in 5 seconds...</p>
</div>
</main>

</body></html>

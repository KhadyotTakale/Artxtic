<script>

                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        serif: ["Playfair Display", "serif"],

                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': '0.75rem',
                        '2xl': '1rem',
                        '3xl': '1.5rem',
                    },
                },
            },
        };

<style>

            font-family: 'Inter', sans-serif;
        }
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image:

                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        }
        .dark .bg-grid-pattern {

                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5); 
            border-radius: 3px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {

            scrollbar-width: none;
        }

<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 min-h-screen relative overflow-x-hidden transition-colors duration-300">

<button class="p-3 bg-gray-900 dark:bg-white text-white dark:text-black rounded-full shadow-lg hover:scale-105 transition-transform">

</button>
<button class="p-3 text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors group">
